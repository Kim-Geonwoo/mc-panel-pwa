name: Package

# 릴리스 태그(v*) push 또는 수동 실행 시 컨테이너 이미지를 빌드해 GHCR에 게시한다.
# 이미지 기본값은 데모 모드(PANEL_DEMO=true)라, 모든 릴리스가 그대로 실행 가능한 공개 데모가 된다.
# (운영 배포에서는 PANEL_DEMO=false와 데이터 경로 환경변수를 주입해 이 기본값을 덮어쓴다 — .env.example 참고.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# 최소 권한: top-level은 읽기만.
permissions:
  contents: read

jobs:
  docker:
    name: GHCR 이미지 빌드·게시
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR로 이미지 push
      id-token: write # cosign keyless 서명의 OIDC 증명
    steps:
      # 액션은 커밋 SHA로 핀 고정(태그 재지정 공급망 공격 방어). Renovate가 갱신을 유지한다.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Buildx 설정
        # provenance 증명(attestation)은 기본 docker 드라이버가 지원하지 않으므로
        # docker-container 드라이버를 쓰는 buildx 빌더가 필요하다.
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: GHCR 로그인
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 메타데이터(태그·라벨) 산출
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          # 이미지 이름은 반드시 소문자여야 한다(GHCR 요구사항).
          images: ghcr.io/kim-geonwoo/mc-panel-pwa
          # 태그에서 뽑은 semver + latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # latest는 릴리스 태그 빌드에만 부여 — 수동 실행(workflow_dispatch)이 브랜치
            # 빌드로 latest를 덮어쓰는 사고를 방지한다. 수동 실행은 sha 태그로만 게시된다.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha
      - name: 이미지 빌드·푸시
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SLSA provenance 증명을 이미지와 함께 게시한다(BuildKit attestation).
          provenance: true
      - name: cosign 설치
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: 이미지 서명(cosign keyless)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # 태그 가변성 공격을 피하기 위해 digest 기준으로 서명한다. keyless(OIDC)라
        # 키 관리가 없고, 서명은 Rekor 투명성 로그에 기록된다. 검증 절차는
        # docs/tag-signing.md 참고.
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes "${tag%%:*}@${DIGEST}"
            break
          done
