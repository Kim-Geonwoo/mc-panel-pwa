name: OSV-Scanner

# OSV.dev 데이터베이스 기반 의존성 취약점 분석(SCA) — Go 모듈과 npm 트리.
# 결과를 SARIF로 Security 탭에 업로드해 발견 항목을 한곳에서 추적한다.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "41 4 * * 1" # 매주 월요일 04:41 UTC

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF 업로드(Security 탭)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
          cache: false
      - name: OSV-Scanner 설치 및 스캔
        continue-on-error: true # 발견 항목은 리포트하되 빌드를 막지 않는다
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.0.2
          "$(go env GOPATH)/bin/osv-scanner" scan source -r --format sarif --output osv.sarif . || true
      - name: SARIF 업로드
        if: ${{ hashFiles('osv.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner
