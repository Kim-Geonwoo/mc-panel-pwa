name: CI

# main·dev에 push/PR마다 모노레포 양쪽을 빌드·검사. 이 잡들이 Renovate 자동병합의 필수 체크가 된다.
# dev는 활성 작업 브랜치라 push 시점에 먼저 걸러야 빌드 불가 커밋이 PR까지 숨지 않는다.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# 최소 권한: CI는 읽기만 하면 된다.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Go API (vet · fmt · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      # 액션은 커밋 SHA로 핀 고정(태그 재지정 공급망 공격 방어). Renovate(helpers:pinGitHubActionDigests)가 갱신을 유지한다.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # 체크아웃 후 git 쓰기 작업이 없으므로 토큰을 남기지 않는다
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: api/go.mod
          cache: false # 표준 라이브러리만 쓰는 모듈이라 캐시할 외부 의존성이 없다
      - name: gofmt 검사
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt 필요:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  web:
    name: Next.js (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: 타입 검사
        run: npx --no-install tsc --noEmit
      - name: 빌드(정적 익스포트)
        run: npm run build
