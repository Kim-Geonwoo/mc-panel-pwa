name: CI

# main·dev에 push/PR마다 모노레포 양쪽을 빌드·검사. 이 잡들이 Renovate 자동병합의 필수 체크가 된다.
# dev는 활성 작업 브랜치라 push 시점에 먼저 걸러야 빌드 불가 커밋이 PR까지 숨지 않는다.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# 최소 권한: CI는 읽기만 하면 된다.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Go API (vet · fmt · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      # 액션은 커밋 SHA로 핀 고정(태그 재지정 공급망 공격 방어). Renovate(helpers:pinGitHubActionDigests)가 갱신을 유지한다.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # 체크아웃 후 git 쓰기 작업이 없으므로 토큰을 남기지 않는다
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: api/go.mod
          cache: true # modernc.org/sqlite 의존성이 생겨 모듈 캐시가 유효하다
          cache-dependency-path: api/go.sum
      - name: gofmt 검사
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt 필요:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  web:
    name: Next.js (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: 타입 검사
        run: npx --no-install tsc --noEmit
      - name: 빌드(정적 익스포트)
        run: npm run build

  web-test:
    name: Next.js (test)
    runs-on: ubuntu-latest
    # SDUI 레이아웃 스키마·파서·탭 해석기 등 순수 로직의 단위 테스트(vitest). 빌드와
    # 분리해 실패 지점을 명확히 하고, 필수 체크로 승격할 수 있게 독립 잡으로 둔다.
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: 단위 테스트(vitest)
        run: npm test

  demo-smoke:
    name: Demo smoke (데모 실행 확인)
    runs-on: ubuntu-latest
    # 데모 실행 키트(demo/)는 항상 현재 main 소스를 빌드해 띄운다. 이 잡이 데모가
    # 실제로 로그인·상태 조회·정적 서빙까지 동작함을 회귀 검증한다(격리를 위해 독립 빌드).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum
      - name: 웹 정적 익스포트 빌드
        working-directory: web
        run: npm ci && npm run build
      - name: api 바이너리 빌드
        working-directory: api
        run: go build -o mc_sv-panel .
      - name: 데모 스모크(로그인·상태·정적)
        run: |
          set -euo pipefail
          # 데모 모드로 패널을 백그라운드 실행(jq는 ubuntu-latest에 기본 설치).
          PANEL_DEMO=true PANEL_LISTEN=127.0.0.1:8081 PANEL_STATIC_DIR=web/out ./api/mc_sv-panel &
          echo $! > panel.pid
          # 최대 30초까지 루트가 200을 줄 때까지 대기.
          for _ in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8081/ >/dev/null; then ready=1; break; fi
            sleep 1
          done
          [ "${ready:-}" = 1 ] || { echo "::error::데모 패널이 30초 안에 준비되지 않음"; exit 1; }
          # ① 로그인: {"code":"000000"} → 토큰 반환
          token="$(curl -fs -X POST http://127.0.0.1:8081/api/login \
            -H 'Content-Type: application/json' -d '{"code":"000000"}' | jq -r '.token')"
          [ -n "$token" ] && [ "$token" != null ] || { echo "::error::로그인 토큰 없음"; exit 1; }
          # ② 상태: Bearer 토큰으로 200 + server_up 필드 포함
          curl -fs http://127.0.0.1:8081/api/status -H "Authorization: Bearer $token" \
            | jq -e 'has("server_up")' >/dev/null || { echo "::error::/api/status에 server_up 없음"; exit 1; }
          # ③ 정적: 루트가 HTML을 서빙
          curl -fs http://127.0.0.1:8081/ | grep -qi '<html' || { echo "::error::루트가 HTML을 서빙하지 않음"; exit 1; }
          # ④ 레이아웃: 공개 GET이 200 + version:1 JSON을 반환(SDUI 부트 회귀 방지)
          curl -fs http://127.0.0.1:8081/api/layout \
            | jq -e '.version == 1' >/dev/null || { echo "::error::/api/layout이 version:1을 반환하지 않음"; exit 1; }
          echo "데모 스모크 통과: 로그인·상태·정적·레이아웃 4가지 모두 정상"
      - name: 데모 패널 종료
        if: always()
        run: '[ -f panel.pid ] && kill "$(cat panel.pid)" 2>/dev/null || true'
