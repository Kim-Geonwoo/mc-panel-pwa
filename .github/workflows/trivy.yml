name: Trivy

# 파일시스템 + IaC/설정 스캔(의존성·설정 파일의 취약점·시크릿).
# 결과를 로그로 리포트하며, 코드 스캐닝(SARIF) 활성화에 의존하지 않는다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "13 5 * * 1" # 매주 월요일 05:13 UTC

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy 파일시스템 + 설정 스캔
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0" # 발견 항목은 로그로 보고하되 빌드를 막지 않는다(Renovate가 갱신을 담당)
