name: Trivy

# 파일시스템 + IaC/설정 스캔(의존성·설정 파일의 취약점·시크릿).
# 결과를 SARIF로 Security 탭에 업로드해 발견 항목을 한곳에서 추적한다.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "13 5 * * 1" # 매주 월요일 05:13 UTC

permissions:
  contents: read
  security-events: write # SARIF 업로드(Security 탭)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Trivy 파일시스템 + 설정 스캔
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0" # 발견 항목은 리포트하되 빌드를 막지 않는다(Renovate가 갱신을 담당)
      - name: SARIF 업로드
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy.sarif
          category: trivy
