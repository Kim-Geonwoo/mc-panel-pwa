name: Scorecard

# OpenSSF Scorecard — 레포 보안 관행을 자동 점검해 Security 탭(code-scanning)에 보고한다.
# 1단계: publish_results=false로 시범 실행해 실점수 확인 → 개선 후 2단계에서 공개+배지.
on:
  branch_protection_rule: # 브랜치 보호 변경 시 즉시 재평가
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 6" # 매주 토요일 01:30 UTC

# Token-Permissions 만점 요건: top-level은 read만, write는 잡 레벨에만.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # SARIF 업로드(Security 탭)
      id-token: write # publish_results의 OIDC 증명(2단계에서 사용)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Scorecard 분석
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

      - name: 결과 아티팩트 보관
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: SARIF 업로드
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: results.sarif
