name: Scorecard

# OpenSSF Scorecard — 레포 보안 관행을 자동 점검한다. 결과는 공개 API(api.scorecard.dev)에
# 게시해 README 배지·뷰어로 전면 공개한다. Scorecard 출력은 "점수"이지 코드 취약점이 아니므로
# code-scanning(Security 탭)에는 SARIF를 올리지 않는다 — 그 탭은 CodeQL·Trivy·OSV 같은 실제
# 코드/의존성 결함 전용으로 둔다. (점수 세부는 scorecard.dev/viewer에서 그대로 확인 가능.)
on:
  branch_protection_rule: # 브랜치 보호 변경 시 즉시 재평가
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 6" # 매주 토요일 01:30 UTC

# Token-Permissions 만점 요건: top-level은 read만, write는 잡 레벨에만.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write # publish_results의 OIDC 증명(공개 게시용)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Scorecard 분석
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: 결과 아티팩트 보관
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
