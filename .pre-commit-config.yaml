# 로컬 pre-commit 훅 — 시크릿·포맷 문제를 커밋 전에 잡는다.
# 최초 설치:  pipx install pre-commit && pre-commit install
# 수동 실행:  pre-commit run --all-files
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: bash -c 'cd api && test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)'
        language: system
        files: '^api/.*\.go$'
        pass_filenames: false
